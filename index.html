<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BLACKBOX · Le fil du barbier</title>
<link rel="stylesheet" href="./fonts.css" />
<style>html,body{margin:0;padding:0;}</style>
<script>
try{var k='dc-viewport:'+location.pathname;if(!localStorage.getItem(k)){var s=Math.min((window.innerWidth-40)/3600,(window.innerHeight-40)/2400);localStorage.setItem(k,JSON.stringify({x:20,y:20,scale:s}));}}catch(e){}
</script>
</head>
<body>
<div id="root"></div>
<script src="./bundle.js"></script>
</body>
</html>
